<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="128" fill="url(#gradient)" />
  <g transform="translate(96, 96)" fill="none" stroke="#ffffff" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <!-- Notebook outline -->
    <rect x="20" y="20" width="230" height="280" rx="20" />
    <line x1="60" y1="80" x2="210" y2="80" stroke-width="14" opacity="0.5" />
    <line x1="60" y1="130" x2="210" y2="130" stroke-width="14" opacity="0.5" />
    <line x1="60" y1="180" x2="160" y2="180" stroke-width="14" opacity="0.5" />
    
    <!-- Microphone overlay -->
    <g transform="translate(140, 140)">
      <!-- Backdrop circle for visibility -->
      <circle cx="70" cy="70" r="75" fill="#2563eb" stroke="#ffffff" stroke-width="12" />
      
      <!-- Microphone body -->
      <rect x="50" y="25" width="40" height="70" rx="20" fill="#ffffff" />
      <path d="M 30,55 A 40,40 0 0 0 110,55" stroke="#ffffff" stroke-width="12" />
      <line x1="70" y1="95" x2="70" y2="120" stroke="#ffffff" stroke-width="12" />
      <line x1="45" y1="120" x2="95" y2="120" stroke="#ffffff" stroke-width="12" />
    </g>
  </g>
</svg>
